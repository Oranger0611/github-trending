name: Daily GitHub Trending Digest

on:
  # ── DEFAULT MODE ──────────────────────────────────────────────
  # Runs automatically every day on the `main` branch, using the
  # prompt committed in prompts/instructions.md.
  schedule:
    # 00:23 UTC daily (= 07:23 Vietnam time, UTC+7). https://crontab.guru
    # NOTE: avoid round times like "0 0" — the top of the hour is the most
    # congested slot on GitHub Actions, so those runs get delayed or dropped.
    # An odd minute (e.g. :23) is far more reliable.
    - cron: "23 0 * * *"

  # ── SPECIAL MODE ──────────────────────────────────────────────
  # Push a branch whose name starts with `run/` to trigger a one-off
  # digest immediately, using THAT branch's prompts/instructions.md.
  # e.g.  git checkout -b run/explain-rust-deeply
  #       (edit prompts/instructions.md)
  #       git commit -am "deep dive on rust" && git push -u origin run/explain-rust-deeply
  push:
    branches:
      - "run/**"

  # Manual button in the Actions tab (uses whichever branch you pick).
  workflow_dispatch: {}

# Don't let two runs of the same branch email you twice; newest wins.
concurrency:
  group: digest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Send the digest
        run: python -m src.main
        env:
          # LLM provider — set whichever ONE you use as a repo secret; the rest
          # stay empty and the app auto-detects the one that's present.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          # Only needed if you set more than one key above (anthropic|openai|gemini|qwen).
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}

          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}   # optional; defaults to GMAIL_USER
          # The cron always emails (never writes a local file on the runner).
          OUTPUT: ${{ vars.OUTPUT || 'email' }}
          # Optional overrides via repo Variables (Settings → Variables):
          #   MODEL  e.g. gpt-4o-mini, gemini-2.0-flash, qwen-plus, claude-opus-4-8
          #   MODE   digest | detail
          MODEL: ${{ vars.MODEL }}
          MODE: ${{ vars.MODE }}
          # Auto-provided by Actions; raises the README fetch rate limit.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Note: GITHUB_EVENT_NAME / GITHUB_REF_NAME are default env vars the
          # runner already provides, so the code reads them without mapping here.
